      No single centralized Purdue developer portal was found. Two public,
      machine-readable APIs were verified live: the community-built Purdue.io OData
      course-catalog API (api.purdue.io/odata returned real Subjects/entity-set data)
      and the PURR OAI-PMH research metadata endpoint (Identify verb returned valid
      OAI-PMH XML). The Purdue Libraries API host resolves but serves only a placeholder
      page ("Libraries API documentation goes here..."). Official GitHub orgs Purdue and
      Purdue-io were confirmed via the GitHub API. No fabricated endpoints; all entries
      reflect probed, observed responses.
