apis:
  - aid: purdue:catalog
    name: Purdue.io Course Catalog API
    description: >-
      A community-built, public OData/REST API exposing Purdue's course catalog data,
      including Campuses, Buildings, Rooms, Terms, Courses, Subjects, Sections and
      related entities. Started as a Purdue CS senior design project; queryable via
      standard OData query options. Confirmed live returning real catalog data.
    humanURL: https://github.com/Purdue-io/PurdueApi
    baseURL: https://api.purdue.io/odata/
    tags: [ Courses, Catalog, OData, Education, Course Catalog ]
    properties:
      - type: Documentation
        url: https://github.com/Purdue-io/PurdueApi
      - type: GitHub
        url: https://github.com/Purdue-io
  - aid: purdue:purr-oaipmh
    name: PURR OAI-PMH Metadata API
    description: >-
      The Purdue University Research Repository (PURR) exposes an OAI-PMH endpoint for
      harvesting research dataset metadata, supporting standard verbs (Identify,
      ListSets, ListMetadataFormats, ListIdentifiers, ListRecords, GetRecord) with the
      oai_dc (Dublin Core) metadata prefix. Confirmed live via the Identify verb.
    humanURL: https://purr.purdue.edu/kb/finduse/oaipmh
    baseURL: https://purr.purdue.edu/oaipmh
    tags: [ Research, Repository, OAI-PMH, Metadata, Open Data ]
    properties:
      - type: Documentation
        url: https://purr.purdue.edu/kb/finduse/oaipmh
