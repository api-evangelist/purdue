---
aid: purdue
name: Purdue University
description: >-
  Purdue University is a public land-grant research university in West Lafayette,
  Indiana, United States, ranked #99 in the QS World University Rankings 2025. Its
  public, machine-readable developer footprint is limited and largely community- or
  service-specific rather than a single centralized developer portal. Confirmed public
  interfaces include the community-built Purdue.io OData course-catalog API and the
  Purdue University Research Repository (PURR) OAI-PMH metadata endpoint. A Purdue
  Libraries API host exists but currently serves only a placeholder page.
