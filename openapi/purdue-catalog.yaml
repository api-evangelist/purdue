openapi: 3.0.3
info:
  title: Purdue.io Course Catalog API
  description: >-
    A community-built, public OData v4 REST API exposing Purdue University's
    course catalog data, including Campuses, Buildings, Rooms, Terms, Courses,
    Classes, Sections, Meetings, Subjects and Instructors. This OpenAPI 3.0
    description was converted faithfully from the live OData v4 $metadata (EDMX
    4.0) document at https://api.purdue.io/odata/$metadata and verified against
    live responses. Entities are queryable via standard OData system query
    options. Note: the live service disables the $top option (limit 0); use
    $skip with server-driven paging instead.
  version: "4.0"
  contact:
    name: Purdue.io
    url: https://github.com/Purdue-io/PurdueApi
  license:
    name: MIT
    url: https://github.com/Purdue-io/PurdueApi/blob/master/LICENSE
servers:
  - url: https://api.purdue.io/odata
    description: Purdue.io OData production service
tags:
  - name: Campuses
  - name: Buildings
  - name: Rooms
  - name: Terms
  - name: Courses
  - name: Classes
  - name: Sections
  - name: Meetings
  - name: Subjects
  - name: Instructors
paths:
  /Campuses:
    get:
      tags: [Campuses]
      operationId: listCampuses
      summary: List campuses
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of campuses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusCollection'
  /Campuses({Id}):
    get:
      tags: [Campuses]
      operationId: getCampus
      summary: Get a campus by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campus'
        '404':
          $ref: '#/components/responses/NotFound'
  /Buildings:
    get:
      tags: [Buildings]
      operationId: listBuildings
      summary: List buildings
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of buildings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingCollection'
  /Buildings({Id}):
    get:
      tags: [Buildings]
      operationId: getBuilding
      summary: Get a building by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single building.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '404':
          $ref: '#/components/responses/NotFound'
  /Rooms:
    get:
      tags: [Rooms]
      operationId: listRooms
      summary: List rooms
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of rooms.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomCollection'
  /Rooms({Id}):
    get:
      tags: [Rooms]
      operationId: getRoom
      summary: Get a room by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '404':
          $ref: '#/components/responses/NotFound'
  /Terms:
    get:
      tags: [Terms]
      operationId: listTerms
      summary: List terms
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of terms.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TermCollection'
  /Terms({Id}):
    get:
      tags: [Terms]
      operationId: getTerm
      summary: Get a term by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single term.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Term'
        '404':
          $ref: '#/components/responses/NotFound'
  /Courses:
    get:
      tags: [Courses]
      operationId: listCourses
      summary: List courses
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of courses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseCollection'
  /Courses({Id}):
    get:
      tags: [Courses]
      operationId: getCourse
      summary: Get a course by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single course.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          $ref: '#/components/responses/NotFound'
  /Classes:
    get:
      tags: [Classes]
      operationId: listClasses
      summary: List classes
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of classes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassCollection'
  /Classes({Id}):
    get:
      tags: [Classes]
      operationId: getClass
      summary: Get a class by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single class.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Class'
        '404':
          $ref: '#/components/responses/NotFound'
  /Sections:
    get:
      tags: [Sections]
      operationId: listSections
      summary: List sections
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of sections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionCollection'
  /Sections({Id}):
    get:
      tags: [Sections]
      operationId: getSection
      summary: Get a section by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single section.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '404':
          $ref: '#/components/responses/NotFound'
  /Meetings:
    get:
      tags: [Meetings]
      operationId: listMeetings
      summary: List meetings
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of meetings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingCollection'
  /Meetings({Id}):
    get:
      tags: [Meetings]
      operationId: getMeeting
      summary: Get a meeting by Id
      parameters:
        - $ref: '#/components/parameters/keyId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: A single meeting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          $ref: '#/components/responses/NotFound'
  /Subjects:
    get:
      tags: [Subjects]
      operationId: listSubjects
      summary: List subjects
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: A collection of subjects.
          content:
